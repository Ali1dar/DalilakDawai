workflows:
  react-native-android:
    name: React Native Android Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: latest
    scripts:
      - name: Unzip full project
        script: |
          unzip -o *.zip
          # البحث عن المجلد الفعلي الذي يحتوي على ملف package.json والانتقال إليه
          Root_Dir=$(find . -name "package.json" -not -path "*/node_modules/*" -exec dirname {} \; | head -n 1)
          if [ -n "$Root_Dir" ] && [ "$Root_Dir" != "." ]; then
            echo "Moving files from $Root_Dir to root"
            mv "$Root_Dir"/* . 2>/dev/null || true
            mv "$Root_Dir"/.* . 2>/dev/null || true
          fi
      - name: Install dependencies
        script: |
          npm install
      - name: Build Android APK
        script: |
          # البحث الديناميكي عن مجلد android والدخول إليه للبناء
          Android_Dir=$(find . -name "gradlew" -not -path "*/node_modules/*" -exec dirname {} \; | head -n 1)
          if [ -n "$Android_Dir" ]; then
            cd "$Android_Dir"
            chmod +x gradlew
            ./gradlew assembleDebug --no-daemon
          else
            echo "Error: gradlew not found!"
            exit 1
          fi
    artifacts:
      - "**/build/outputs/apk/debug/*.apk"
