workflows:
  react-native-android:
    name: React Native Android Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: latest
    scripts:
      - name: Unzip full project
        script: |
          unzip -o *.zip
          Root_Dir=$(find . -name "package.json" -not -path "*/node_modules/*" -exec dirname {} \; | head -n 1)
          if [ -n "$Root_Dir" ] && [ "$Root_Dir" != "." ]; then
            mv "$Root_Dir"/* . 2>/dev/null || true
            mv "$Root_Dir"/.* . 2>/dev/null || true
          fi
      - name: Install dependencies
        script: |
          npm install
      - name: Build Android APK
        script: |
          Android_Dir=$(find . -name "build.gradle" -not -path "*/node_modules/*" -exec dirname {} \; | grep -v "/app" | head -n 1)
          if [ -z "$Android_Dir" ]; then
            Android_Dir="./android"
          fi
          
          cd "$Android_Dir"
          
          # حقن الإصدارات المستقرة مباشرة داخل ملفات gradle لتعويض أي نقص في الـ zip
          echo "Injecting clean configurations..."
          if [ -f "build.gradle" ]; then
            sed -i '' 's/com.android.tools.build:gradle:.*/com.android.tools.build:gradle:8.2.1/g' build.gradle 2>/dev/null || sed -i 's/com.android.tools.build:gradle:.*/com.android.tools.build:gradle:8.2.1/g' build.gradle
            sed -i '' 's/com.facebook.react:react-native-gradle-plugin:.*/com.facebook.react:react-native-gradle-plugin:0.73.4/g' build.gradle 2>/dev/null || sed -i 's/com.facebook.react:react-native-gradle-plugin:.*/com.facebook.react:react-native-gradle-plugin:0.73.4/g' build.gradle
          fi
          
          # تهيئة ملف الخصائص الأساسي
          echo "newArchEnabled=false" > gradle.properties
          echo "HERMES_ENABLED=true" >> gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          # توليد الـ Wrapper بإصدار مستقر متوافق
          gradle wrapper --gradle-version 8.4
          
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
    artifacts:
      - "**/build/outputs/apk/debug/*.apk"
