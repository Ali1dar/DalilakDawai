workflows:
  react-native-android:
    name: React Native Android Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: latest
    scripts:
      - name: Unzip full project
        script: |
          unzip -o *.zip
          # العثور على المجلد الرئيسي للمشروع ونقل الملفات للـ Root
          Root_Dir=$(find . -name "package.json" -not -path "*/node_modules/*" -exec dirname {} \; | head -n 1)
          if [ -n "$Root_Dir" ] && [ "$Root_Dir" != "." ]; then
            mv "$Root_Dir"/* . 2>/dev/null || true
            mv "$Root_Dir"/.* . 2>/dev/null || true
          fi
      - name: Install dependencies
        script: |
          npm install
      - name: Build Android APK
        script: |
          # البحث عن مجلد android الفعلي
          Android_Dir=$(find . -name "build.gradle" -not -path "*/node_modules/*" -exec dirname {} \; | grep -v "/app" | head -n 1)
          if [ -z "$Android_Dir" ]; then
            Android_Dir="./android"
          fi
          
          cd "$Android_Dir"
          
          # خدعة سحرية: إذا كان ملف gradlew مفقوداً، سنقوم بتوليده وإعطائه الصلاحيات فوراً
          if [ ! -f "gradlew" ]; then
            echo "gradlew not found, generating wrapper..."
            gradle wrapper --gradle-version 8.6
          fi
          
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
    artifacts:
      - "**/build/outputs/apk/debug/*.apk"
