workflows:
  react-native-android:
    name: React Native Android Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: latest
    scripts:
      - name: Unzip full project
        script: |
          unzip -o *.zip
          Root_Dir=$(find . -name "package.json" -not -path "*/node_modules/*" -exec dirname {} \; | head -n 1)
          if [ -n "$Root_Dir" ] && [ "$Root_Dir" != "." ]; then
            mv "$Root_Dir"/* . 2>/dev/null || true
            mv "$Root_Dir"/.* . 2>/dev/null || true
          fi
      - name: Install dependencies
        script: |
          npm install
      - name: Build Android APK
        script: |
          Android_Dir=$(find . -name "build.gradle" -not -path "*/node_modules/*" -exec dirname {} \; | grep -v "/app" | head -n 1)
          if [ -z "$Android_Dir" ]; then
            Android_Dir="./android"
          fi
          
          cd "$Android_Dir"
          
          # 1. إعادة بناء ملف build.gradle الرئيسي ليكون نظيفاً ومضموناً 100%
          echo "building clean root build.gradle..."
          cat << 'EOF' > build.gradle
          buildscript {
              ext {
                  buildToolsVersion = "34.0.0"
                  minSdkVersion = "23"
                  compileSdkVersion = 34
                  targetSdkVersion = 34
                  ndkVersion = "25.1.8937393"
                  kotlinVersion = "1.8.0"
              }
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath("com.android.tools.build:gradle:8.2.1")
                  classpath("com.facebook.react:react-native-gradle-plugin")
                  classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
              }
          }
          allprojects {
              repositories {
                  mavenCentral()
                  google()
                  maven { url "$rootDir/../node_modules/react-native/android" }
                  maven { url "$rootDir/../node_modules/jsc-android/dist" }
                  maven { url 'https://www.jitpack.io' }
              }
          }
          EOF

          # 2. تهيئة ملف الخصائص القياسي
          echo "Setting up gradle.properties..."
          echo "newArchEnabled=false" > gradle.properties
          echo "HERMES_ENABLED=true" >> gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties
          echo "android.enableJetifier=true" >> gradle.properties
          
          # 3. إنشاء ملف الـ Wrapper بشكل سليم
          gradle wrapper --gradle-version 8.4
          
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon
    artifacts:
      - "**/build/outputs/apk/debug/*.apk"
