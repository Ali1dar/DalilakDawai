workflows:
  react-native-android:
    name: React Native Android Workflow
    max_build_duration: 60
    instance_type: mac_mini_m1
    environment:
      node: latest
    scripts:
      - name: Unzip full project
        script: |
          unzip -o *.zip
          Root_Dir=$(find . -name "package.json" -not -path "*/node_modules/*" -exec dirname {} \; | head -n 1)
          if [ -n "$Root_Dir" ] && [ "$Root_Dir" != "." ]; then
            mv "$Root_Dir"/* . 2>/dev/null || true
            mv "$Root_Dir"/.* . 2>/dev/null || true
          fi
      - name: Install dependencies
        script: |
          npm install
      - name: Build Android APK
        script: |
          Android_Dir=$(find . -name "build.gradle" -not -path "*/node_modules/*" -exec dirname {} \; | grep -v "/app" | head -n 1)
          if [ -z "$Android_Dir" ]; then
            Android_Dir="./android"
          fi
          
          cd "$Android_Dir"
          
          # توليد وإصلاح ملف الخصائص وضخ الإصدارات المفقودة لتخطي خطأ الـ Could not find
          echo "Fixing gradle.properties..."
          echo "newArchEnabled=false" > gradle.properties
          echo "HERMES_ENABLED=true" >> gradle.properties
          
          if [ ! -f "gradlew" ]; then
            gradle wrapper --gradle-version 8.6
          fi
          
          chmod +x gradlew
          # تشغيل البناء مع تمرير الإصدارات الأساسية مباشرة لتفادي فقدانها
          ./gradlew assembleDebug -Pandroid.useAndroidX=true -Pandroid.enableJetifier=true --no-daemon
    artifacts:
      - "**/build/outputs/apk/debug/*.apk"
